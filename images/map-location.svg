  </g>
  <ellipse cx="300" cy="245" rx="26" ry="8" fill="#4A3527" opacity="0.25"/>

  <!-- Label -->
  <rect x="220" y="60" width="200" height="34" rx="17" fill="#FFFDF8" stroke="#B8894B" stroke-width="2"/>
  <text x="320" y="82" font-family="'Jost', sans-serif" font-size="14" fill="#4A3527" text-anchor="middle">Golden Crumb Bakery</text>
