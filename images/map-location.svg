<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="400" fill="#EFE5D2"/>

  <!-- Map "blocks" -->
  <rect x="0" y="0" width="640" height="400" fill="#F6EFE2"/>
  <rect x="40" y="40" width="150" height="110" rx="6" fill="#E4C989" opacity="0.5"/>
  <rect x="230" y="70" width="120" height="90" rx="6" fill="#E4C989" opacity="0.4"/>
  <rect x="420" y="30" width="170" height="130" rx="6" fill="#E4C989" opacity="0.5"/>
  <rect x="60" y="230" width="140" height="120" rx="6" fill="#E4C989" opacity="0.4"/>
  <rect x="260" y="240" width="150" height="110" rx="6" fill="#E4C989" opacity="0.5"/>
  <rect x="450" y="220" width="150" height="130" rx="6" fill="#E4C989" opacity="0.4"/>

  <!-- Roads -->
  <path d="M0 190 H640" stroke="#D9B876" stroke-width="14"/>
  <path d="M0 190 H640" stroke="#FFFDF8" stroke-width="3" stroke-dasharray="10 10"/>
  <path d="M210 0 V400" stroke="#D9B876" stroke-width="14"/>
  <path d="M210 0 V400" stroke="#FFFDF8" stroke-width="3" stroke-dasharray="10 10"/>
